version: '3.9'

services:
  ja-database:
    image: postgres:16-alpine
    container_name: ja-database
    restart: unless-stopped
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432" # comment out on server, for local dev only
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ja-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ja-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - backend-net
    depends_on:
      ja-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ja-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ja-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - backend-net
    # depends_on:
    #   ja-backend:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgresql_data:
    driver: local

networks:
  backend-net:
    external: true