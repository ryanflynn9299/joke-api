spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url:               jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:jokedb}
    username:          ${POSTGRES_USER}
    password:          ${POSTGRES_PASSWORD} 

    hikari:
      pool-name: joke-api-pool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    show-sql:          false
    generate-ddl:      false
    open-in-view:      false
    hibernate:
      ddl-auto:        none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true 
    baseline-version: 1


  # jackson:
  #   serialization:
  #     WRITE_DATES_AS_TIMESTAMPS: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    org.springframework: info
    # org.springframework.security: debug
    # org.springframework.security.oauth2: debug

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

# springdoc-openapi configuration (root-level)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method  # Sorts endpoints by GET/POST/PUT